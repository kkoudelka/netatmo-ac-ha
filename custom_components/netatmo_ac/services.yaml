set_state:
  target:
    entity:
      domain: climate
      integration: netatmo_ac
  fields:
    hvac_mode:
      example: cool
      selector:
        select:
          options:
            - "off"
            - cool
    temperature:
      example: 22
      selector:
        number:
          min: 10
          max: 40
          step: 0.5
          unit_of_measurement: "°C"
    fan_mode:
      example: high
      selector:
        select:
          options:
            - low
            - medium
            - high
    duration:
      example: 30
      selector:
        number:
          min: 5
          max: 480
          step: 5
          unit_of_measurement: min
